<div class="vsc-statusbar" role="contentinfo" aria-label="Status bar">

  <!-- Left section -->
  <div class="vsc-statusbar__left">
    <span class="vsc-statusbar__item" title="Source Control">
      <!-- Git branch icon -->
      <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M11.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 000 2H6.25v.128a2.25 2.25 0 11-1.5 0V10.5A2.5 2.5 0 012.5 8V6.372a2.25 2.25 0 111.5 0V8a1 1 0 001 1h4A1 1 0 009.5 8V5.372A2.25 2.25 0 019.5 3.25zM4.25 12a.75.75 0 100 1.5.75.75 0 000-1.5zM3.25 4a.75.75 0 111.5 0 .75.75 0 01-1.5 0z"/>
      </svg>
      main
    </span>
    <span class="vsc-statusbar__item" title="No problems detected">
      <!-- Check circle icon -->
      <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 1a7 7 0 100 14A7 7 0 008 1zM0 8a8 8 0 1116 0A8 8 0 010 8zm11.78-1.72a.75.75 0 00-1.06-1.06L6.75 9.19 5.28 7.72a.75.75 0 00-1.06 1.06l2 2a.75.75 0 001.06 0l4.5-4.5z"/>
      </svg>
      0
      <!-- Warning icon -->
      <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" style="margin-left:4px">
        <path d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0114.082 15H1.918a1.75 1.75 0 01-1.543-2.575zm1.763.707a.25.25 0 00-.44 0L1.698 13.132a.25.25 0 00.22.368h12.164a.25.25 0 00.22-.368zm.53 3.996v2.5a.75.75 0 01-1.5 0v-2.5a.75.75 0 011.5 0zM9 11a1 1 0 11-2 0 1 1 0 012 0z"/>
      </svg>
      0
    </span>
  </div>

  <!-- Right section -->
  <div class="vsc-statusbar__right">
    <span class="vsc-statusbar__item">{{ site.posts | size }} posts</span>
    <span class="vsc-statusbar__item">Markdown</span>
    <span class="vsc-statusbar__item">UTF-8</span>
    <span class="vsc-statusbar__item">Jekyll {{ jekyll.version }}</span>
    <a class="vsc-statusbar__item" href="{{ "/feed.xml" | relative_url }}" title="RSS Feed" aria-label="RSS Feed">
      <!-- RSS icon -->
      <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M2.002 2.725a.75.75 0 01.797-.699C8.79 2.42 13.58 7.21 13.974 13.201a.75.75 0 11-1.497.098 10.502 10.502 0 00-9.776-9.776.75.75 0 01-.699-.798zM2.84 7.05a.75.75 0 01.745-.755 7.5 7.5 0 017.12 7.12.75.75 0 01-1.499.079 6 6 0 00-5.7-5.7.75.75 0 01-.755-.745zm.75 5.45a1 1 0 110 2 1 1 0 010-2z"/>
      </svg>
      RSS
    </a>
    <a class="vsc-statusbar__item" href="https://github.com/ppablobr" target="_blank" rel="noopener" title="GitHub" aria-label="GitHub">
      <!-- GitHub icon -->
      <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>

</div>
